# Default values for VSentry
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: laenix/vsentry
  # Overrides the image tag whose default is the chart appVersion
  tag: "latest"
  pullPolicy: IfNotPresent
  # Optionally specify all image pull secrets
  # pullSecrets: []

imageBackend:
  repository: laenix/vsentry-backend
  tag: "latest"
  pullPolicy: IfNotPresent

imageFrontend:
  repository: laenix/vsentry-frontend
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Annotations to add to the service account
  annotations: {}

# Pod annotations
podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8088
  annotations: {}

# Configuration for ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: vsentry.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: vsentry-tls
  #    hosts:
  #      - vsentry.local

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Persistence configuration
persistence:
  enabled: false
  storageClass: "standard"
  size: 10Gi
  accessMode: ReadWriteOnce
  # existingClaim: ""

# VictoriaLogs embedded configuration
victorialogs:
  enabled: true
  # Full URL if using external VictoriaLogs
  url: "http://localhost:9428"
  # Resource limits for embedded VictoriaLogs
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# External VictoriaLogs (when victorialogs.enabled is false)
externalVictorialogs:
  enabled: false
  url: "http://victorialogs:9428"

# Application configuration
config:
  # External URL for collector endpoint generation
  externalUrl: "http://localhost:8088"
  # JWT secret - CHANGE IN PRODUCTION
  jwtSecret: "your-secret-key-change-in-production"
  # Log level (debug, info, warn, error)
  logLevel: "info"

# Database configuration
database:
  # Use embedded SQLite
  type: sqlite
  # Or use external MySQL/PostgreSQL
  # type: mysql
  # host: "mysql:3306"
  # username: "vsentry"
  # password: "password"
  # database: "vsentry"

# Readiness and liveness probes
readinessProbe:
  httpGet:
    path: /api/health
    port: 8088
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /api/health
    port: 8088
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
